<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票 AI 分析 - AI Workshop</title>
<style>
:root {
  --bg: #0f0f14; --surface: #1a1a24; --border: #2a2a3a;
  --text: #e8e8f0; --text2: #8888a0; --accent: #6366f1;
  --red: #ef4444; --green: #22c55e; --blue: #3b82f6; --yellow: #eab308;
  --orange: #f97316; --pink: #ec4899;
}
* { margin:0; padding:0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 20px; font-weight: 700; color: var(--accent); cursor: pointer; }
.nav { display: flex; gap: 8px; }
.nav a { color: var(--text2); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; transition: all .2s; }
.nav a:hover, .nav a.active { background: #6366f122; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 12px; }
.btn-login { padding: 8px 20px; border-radius: 8px; background: var(--accent); color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-login:hover { background: #5558e6; }
.user-menu { position: relative; }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; font-size: 14px; }
.user-dropdown { position: absolute; top: 44px; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; min-width: 180px; display: none; z-index: 200; overflow: hidden; }
.user-dropdown.show { display: block; }
.user-dropdown div { padding: 12px 16px; cursor: pointer; font-size: 14px; transition: background .15s; }
.user-dropdown div:hover { background: #6366f122; }
.user-dropdown .username { font-weight: 600; color: var(--accent); cursor: default; }
.user-dropdown .username:hover { background: transparent; }

/* Modal */
.modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 400px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 20px; margin-bottom: 24px; }
.modal input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; outline: none; margin-bottom: 16px; }
.modal input:focus { border-color: var(--accent); }
.modal button[type=submit] { width: 100%; padding: 12px; border-radius: 10px; background: var(--accent); color: white; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
.modal button[type=submit]:hover { background: #5558e6; }
.modal .switch-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text2); }
.modal .switch-link a { color: var(--accent); cursor: pointer; text-decoration: none; }
.modal .error-msg { color: var(--red); font-size: 13px; margin-bottom: 12px; display: none; }
.modal .error-msg.show { display: block; }

/* Container */
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.main-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
@media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

/* Search */
.search-bar { display: flex; gap: 12px; margin-bottom: 16px; }
.search-bar input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px; outline: none; }
.search-bar input:focus { border-color: var(--accent); }
.search-bar select { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px; outline: none; cursor: pointer; }
.search-bar button { padding: 12px 24px; border-radius: 10px; background: var(--accent); color: white; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; }
.search-bar button:hover { background: #5558e6; }
.search-bar button:disabled { opacity: .5; cursor: not-allowed; }
.search-results { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; max-height: 300px; overflow-y: auto; display: none; }
.search-results.show { display: block; }
.search-results div { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.search-results div:hover { background: #6366f122; }
.search-results div:last-child { border-bottom: none; }

/* Tab Navigation */
.tab-nav { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab-nav button { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; transition: all .2s; white-space: nowrap; }
.tab-nav button:hover, .tab-nav button.active { background: #6366f122; color: var(--accent); border-color: var(--accent); }

/* Market Overview */
.market-overview { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
.index-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; min-width: 150px; flex-shrink: 0; cursor: pointer; transition: border-color .2s; }
.index-card:hover { border-color: var(--accent); }
.index-name { font-size: 12px; color: var(--text2); margin-bottom: 6px; white-space: nowrap; }
.index-price { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.index-change { font-size: 13px; font-weight: 600; }
.up { color: var(--red); }
.down { color: var(--green); }

/* Global Market Tabs */
.global-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
.global-section h4 { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.global-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.global-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 8px; background: var(--bg); cursor: pointer; transition: all .2s; }
.global-item:hover { background: #6366f122; }
.global-item .gi-name { font-size: 13px; color: var(--text2); }
.global-item .gi-price { font-size: 15px; font-weight: 600; }
.global-item .gi-change { font-size: 12px; margin-left: 8px; }
.global-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.global-tabs button { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; }
.global-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Sector Heatmap */
.heatmap-container { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px; }
.heatmap-cell { padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; transition: transform .15s; }
.heatmap-cell:hover { transform: scale(1.05); }

/* North Bound Flow */
.flow-bar { display: flex; align-items: end; gap: 3px; height: 100px; padding: 8px 0; }
.flow-bar div { flex: 1; min-width: 8px; border-radius: 2px 2px 0 0; transition: opacity .2s; }
.flow-summary { display: flex; gap: 24px; margin-top: 8px; font-size: 13px; }

/* Dragon Tiger List */
.dt-table { width: 100%; font-size: 13px; border-collapse: collapse; }
.dt-table th { color: var(--text2); font-weight: 400; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
.dt-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.dt-table tr:hover td { background: #6366f122; }
.dt-table .stock-link { color: var(--accent); cursor: pointer; }

/* Comparison */
.compare-inputs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.compare-inputs input { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; width: 140px; }
.compare-inputs select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
.compare-inputs button { padding: 8px 16px; border-radius: 8px; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 13px; }
.compare-table { width: 100%; font-size: 13px; border-collapse: collapse; margin-top: 8px; }
.compare-table th, .compare-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right; }
.compare-table th:first-child, .compare-table td:first-child { text-align: left; color: var(--text2); }

/* Screener */
.screener-form { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 12px; }
.screener-form div { display: flex; flex-direction: column; gap: 4px; }
.screener-form label { font-size: 12px; color: var(--text2); }
.screener-form input, .screener-form select { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
.screener-form button { padding: 8px 20px; border-radius: 6px; background: var(--accent); color: white; border: none; cursor: pointer; align-self: end; }

/* Quote Card */
.quote-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 24px; display: none; }
.quote-card.show { display: block; }
.quote-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
.quote-name { font-size: 24px; font-weight: 700; }
.quote-code { color: var(--text2); font-size: 14px; }
.quote-price { font-size: 36px; font-weight: 800; }
.quote-change { font-size: 18px; font-weight: 600; }
.quote-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; margin-top: 16px; }
.detail-item .label { color: var(--text2); font-size: 12px; margin-bottom: 4px; }
.detail-item .value { font-size: 15px; font-weight: 500; }
.watchlist-btn { margin-top: 12px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; font-size: 13px; transition: all .2s; }
.watchlist-btn:hover { background: #6366f122; }
.watchlist-btn.in-list { background: var(--accent); color: white; }

/* Chart Area */
.chart-section { margin-bottom: 24px; }
.chart-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.chart-tabs button { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; }
.chart-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
.chart-container { display: none; }
.chart-container.show { display: block; }
.chart-container canvas { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 8px; width: 100%; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }

/* Financial Data */
.financial-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 8px; }
.fin-item { background: var(--bg); border-radius: 8px; padding: 12px; text-align: center; }
.fin-item .fin-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.fin-item .fin-value { font-size: 18px; font-weight: 700; color: var(--accent); }

/* Analysis */
.aspect-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.aspect-btns button { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-size: 13px; transition: all .2s; }
.aspect-btns button:hover, .aspect-btns button.active { border-color: var(--accent); color: var(--accent); }
.analysis-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-height: 200px; display: none; }
.analysis-box.show { display: block; }
.analysis-box h3 { margin-bottom: 16px; font-size: 18px; color: var(--accent); }
.analysis-box .content { color: var(--text); font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
.actions { display: flex; gap: 8px; margin-top: 16px; }
.actions button { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
.btn-pdf { background: var(--accent); color: white; }
.btn-pdf:hover { background: #5558e6; }
.btn-save-history { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
.btn-save-history:hover { border-color: var(--accent); color: var(--accent); }

/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 16px; }
.sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; max-height: 400px; overflow-y: auto; }
.sidebar-card h3 { font-size: 15px; margin-bottom: 12px; color: var(--accent); position: sticky; top: 0; background: var(--surface); padding-bottom: 8px; }
.sidebar-card .empty { color: var(--text2); font-size: 13px; text-align: center; padding: 16px 0; }

.watchlist-item, .alert-item, .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.watchlist-item:last-child, .alert-item:last-child, .history-item:last-child { border-bottom: none; }
.watchlist-item:hover, .alert-item:hover, .history-item:hover { background: #6366f122; margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 6px; }
.wl-name { font-size: 14px; font-weight: 500; }
.wl-code { font-size: 12px; color: var(--text2); }
.wl-price { font-size: 14px; font-weight: 600; float: right; }
.alert-condition { font-size: 12px; color: var(--text2); margin-top: 4px; }
.alert-triggered { color: var(--yellow); font-size: 12px; }

.alert-form { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-top: 12px; }
.alert-form.show { display: block; }
.alert-form select, .alert-form input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 10px; outline: none; }
.alert-form button { padding: 8px 16px; border-radius: 8px; background: var(--accent); color: white; border: none; font-size: 13px; cursor: pointer; }

/* Loading */
.loading { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Flash animation */
@keyframes flash-green { 0%,100% { background-color: transparent; } 50% { background-color: #22c55e33; } }
@keyframes flash-red { 0%,100% { background-color: transparent; } 50% { background-color: #ef444433; } }
.flash-up { animation: flash-red .6s ease-in-out; }
.flash-down { animation: flash-green .6s ease-in-out; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo" onclick="location.href='/'">AI Workshop / 股票分析</div>
  <div class="nav">
    <a href="/">首页</a>
    <a href="/stock" class="active">股票分析</a>
    <a href="/media">自媒体助手</a>
    <a href="/services">接单服务</a>
  </div>
  <div class="header-right">
    <button class="btn-login" id="btnLogin" onclick="showAuthModal('login')">登录 / 注册</button>
    <div class="user-menu" id="userMenu" style="display:none">
      <div class="user-avatar" id="userAvatar" onclick="toggleDropdown()"></div>
      <div class="user-dropdown" id="userDropdown">
        <div class="username" id="ddUsername"></div>
        <div onclick="showSection('watchlist')">📌 自选股</div>
        <div onclick="showSection('alerts')">🔔 股价提醒</div>
        <div onclick="showSection('history')">📊 分析历史</div>
        <div onclick="logout()">🚪 退出登录</div>
      </div>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <h2 id="authTitle">登录</h2>
    <div class="error-msg" id="authError"></div>
    <input type="text" id="authUsername" placeholder="用户名">
    <input type="email" id="authEmail" placeholder="邮箱（注册必填）" style="display:none">
    <input type="password" id="authPassword" placeholder="密码（至少6位）">
    <button type="submit" id="authSubmit" onclick="submitAuth()">登录</button>
    <div class="switch-link">
      <span id="authSwitchText">没有账号？</span>
      <a onclick="switchAuthMode()">去注册</a>
    </div>
  </div>
</div>

<!-- Main Container -->
<div class="container">
  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" id="stockSearch" placeholder="输入股票代码或名称...（600519、贵州茅台、AAPL、00700）" autocomplete="off">
    <select id="marketSelect">
      <option value="cn">A股</option>
      <option value="hk">港股</option>
      <option value="us">美股</option>
    </select>
    <button id="searchBtn" onclick="searchStock()">🔍 搜索</button>
  </div>
  <div class="search-results" id="searchResults"></div>

  <!-- Tab Navigation -->
  <div class="tab-nav" id="mainTabs">
    <button class="active" data-tab="dashboard">🌍 市场概览</button>
    <button data-tab="heatmap">🔥 板块热力</button>
    <button data-tab="flow">💰 北向资金</button>
    <button data-tab="dragon">🐉 龙虎榜</button>
    <button data-tab="compare">⚖ 个股对比</button>
    <button data-tab="screener">🔍 智能选股</button>
  </div>

  <!-- Dashboard Tab -->
  <div id="tab-dashboard" class="tab-content">
    <!-- A股大盘 -->
    <div class="market-overview" id="marketOverview">
      <div class="loading" style="padding:16px">加载大盘数据中...</div>
    </div>
    <!-- 全球市场 -->
    <div class="global-section" id="globalSection">
      <div class="global-tabs" id="globalTabs">
        <button class="active" data-region="asia">亚 太</button>
        <button data-region="europe">欧 洲</button>
        <button data-region="commodities">商 品</button>
        <button data-region="crypto">加密货币</button>
      </div>
      <div class="global-grid" id="globalGrid">
        <div class="loading" style="padding:16px;grid-column:1/-1">加载全球数据中...</div>
      </div>
    </div>
  </div>

  <!-- Heatmap Tab -->
  <div id="tab-heatmap" class="tab-content" style="display:none">
    <div class="global-section">
      <h4>行业板块热力图</h4>
      <div class="heatmap-container" id="sectorHeatmap"></div>
      <h4 style="margin-top:16px">概念板块</h4>
      <div class="heatmap-container" id="conceptHeatmap"></div>
    </div>
  </div>

  <!-- North Bound Flow Tab -->
  <div id="tab-flow" class="tab-content" style="display:none">
    <div class="global-section">
      <h4>沪深港通北向资金净流入（近30日）</h4>
      <div class="chart-container show"><canvas id="flowChart" height="200"></canvas></div>
      <div class="flow-summary" id="flowSummary"></div>
    </div>
  </div>

  <!-- Dragon Tiger Tab -->
  <div id="tab-dragon" class="tab-content" style="display:none">
    <div class="global-section">
      <h4>🐉 今日龙虎榜</h4>
      <table class="dt-table">
        <thead><tr><th>股票</th><th>现价</th><th>涨跌幅</th><th>龙虎榜净买</th></tr></thead>
        <tbody id="dtBody"><tr><td colspan="4" class="empty">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Compare Tab -->
  <div id="tab-compare" class="tab-content" style="display:none">
    <div class="global-section">
      <h4>⚖ 个股对比（最多5只）</h4>
      <div class="compare-inputs">
        <div id="compareSlots">
          <input type="text" class="compare-code" placeholder="代码 (如 600519)" data-idx="0">
          <select class="compare-mkt" data-idx="0"><option value="cn">A股</option><option value="hk">港股</option><option value="us">美股</option></select>
          <input type="text" class="compare-code" placeholder="代码 (如 000858)" data-idx="1">
          <select class="compare-mkt" data-idx="1"><option value="cn">A股</option><option value="hk">港股</option><option value="us">美股</option></select>
        </div>
        <button onclick="addCompareSlot()">+</button>
        <button onclick="runCompare()">对比</button>
      </div>
      <div id="compareResult"></div>
    </div>
  </div>

  <!-- Screener Tab -->
  <div id="tab-screener" class="tab-content" style="display:none">
    <div class="global-section">
      <h4>🔍 智能选股</h4>
      <div class="screener-form">
        <div><label>市盈率 ≤</label><input type="number" id="scrPE" placeholder="如 30"></div>
        <div><label>市盈率 ≥</label><input type="number" id="scrPEMin" placeholder="如 0"></div>
        <div><label>市值 ≥ (亿元)</label><input type="number" id="scrMktCap" placeholder="如 100"></div>
        <div><label>涨幅 ≥ (%)</label><input type="number" id="scrChgMin" step="any" placeholder="如 0"></div>
        <div><label>涨幅 ≤ (%)</label><input type="number" id="scrChgMax" step="any" placeholder="如 5"></div>
        <button onclick="runScreener()">开始筛选</button>
      </div>
      <div id="screenerResult"></div>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Left Column -->
    <div class="main-content">
      <!-- Quote Card -->
      <div class="quote-card" id="quoteCard">
        <div class="quote-header">
          <div>
            <div class="quote-name" id="quoteName">--</div>
            <div class="quote-code" id="quoteCode">--</div>
          </div>

<script>
// =========================================================
// Global State
// =========================================================
let currentStock = null;
let currentAnalysis = "";
let currentAspect = "comprehensive";
let isLogin = false;
let currentUser = null;
let globalData = null;
let klineChart = null;
let macdChart = null;
let rsiChart = null;
let intradayChart = null;
let flowChart = null;

const MARKET_LABELS = { cn: "A股", hk: "港股", us: "美股" };
const MARKET_COLORS = { cn: "#ef4444", hk: "#22c55e", us: "#3b82f6" };

// =========================================================
// Init
// =========================================================
document.addEventListener("DOMContentLoaded", () => {
  checkLogin();
  loadMarketIndices();
  loadGlobalIndices();
  setInterval(loadMarketIndices, 30000);

  document.getElementById("stockSearch").addEventListener("keydown", e => { if (e.key === "Enter") searchStock(); });
  document.getElementById("stockSearch").addEventListener("input", debounce(autoSearch, 300));
  document.addEventListener("click", e => {
    if (!e.target.closest(".user-menu")) toggleDropdown(false);
  });

  // Main tabs
  document.querySelectorAll("#mainTabs button").forEach(btn => {
    btn.addEventListener("click", () => switchMainTab(btn.dataset.tab));
  });

  // Chart tabs
  document.querySelectorAll(".chart-tabs button").forEach(btn => {
    btn.addEventListener("click", () => switchChartTab(btn.dataset.chart));
  });

  // Global region tabs
  document.querySelectorAll("#globalTabs button").forEach(btn => {
    btn.addEventListener("click", () => switchGlobalRegion(btn.dataset.region));
  });
});

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

// =========================================================
// Tab Switching
// =========================================================
function switchMainTab(tabId) {
  document.querySelectorAll("#mainTabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === tabId));
  document.querySelectorAll(".tab-content").forEach(el => el.style.display = "none");
  const target = document.getElementById("tab-" + tabId);
  if (target) target.style.display = "block";

  if (tabId === "flow") loadNorthBound();
  if (tabId === "heatmap") loadSectorHeatmap();
  if (tabId === "dragon") loadDragonTiger();
}

function switchChartTab(chartId) {
  document.querySelectorAll(".chart-tabs button").forEach(b => b.classList.toggle("active", b.dataset.chart === chartId));
  document.querySelectorAll("#chartKline, #chartIntraday, #chartFinancials").forEach(el => {
    el.classList.toggle("show", el.id === "chart" + chartId.charAt(0).toUpperCase() + chartId.slice(1));
  });
  if (chartId === "intraday" && currentStock) loadIntraday();
  if (chartId === "financials" && currentStock) loadFinancials();
}

function switchGlobalRegion(region) {
  document.querySelectorAll("#globalTabs button").forEach(b => b.classList.toggle("active", b.dataset.region === region));
  renderGlobalRegion(region);
}

// =========================================================
// Auth
// =========================================================
async function checkLogin() {
  try {
    const r = await fetch("/api/auth/me");
    const d = await r.json();
    if (d.logged_in) {
      isLogin = true;
      currentUser = d.user;
      onLoginStateChange();
      loadWatchlist();
      loadAlerts();
      loadHistory();
    }
  } catch(e) {}
}

function onLoginStateChange() {
  document.getElementById("btnLogin").style.display = isLogin ? "none" : "inline-block";
  document.getElementById("userMenu").style.display = isLogin ? "flex" : "none";
  document.getElementById("sidebar").style.display = isLogin ? "flex" : "none";
  if (isLogin) {
    document.getElementById("userAvatar").textContent = currentUser.username[0].toUpperCase();
    document.getElementById("ddUsername").textContent = currentUser.username;
  }
}

function showAuthModal(mode) { document.getElementById("authModal").classList.add("show"); if (mode === "register") switchAuthMode(true); }
function closeAuthModal() { document.getElementById("authModal").classList.remove("show"); }

let isRegisterMode = false;
function switchAuthMode(forceRegister) {
  isRegisterMode = forceRegister !== undefined ? forceRegister : !isRegisterMode;
  document.getElementById("authTitle").textContent = isRegisterMode ? "注册" : "登录";
  document.getElementById("authEmail").style.display = isRegisterMode ? "block" : "none";
  document.getElementById("authSubmit").textContent = isRegisterMode ? "注册" : "登录";
  document.getElementById("authSwitchText").textContent = isRegisterMode ? "已有账号？" : "没有账号？";
  document.getElementById("authSwitchText").nextElementSibling.textContent = isRegisterMode ? "去登录" : "去注册";
  document.getElementById("authError").classList.remove("show");
}

async function submitAuth() {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value;
  const email = document.getElementById("authEmail").value.trim();
  if (!username || !password) { showAuthError("请输入用户名和密码"); return; }
  if (isRegisterMode && password.length < 6) { showAuthError("密码至少6位"); return; }
  const url = isRegisterMode ? "/api/auth/register" : "/api/auth/login";
  const body = isRegisterMode ? { username, email, password } : { username, password };
  try {
    const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.error) { showAuthError(d.error); return; }
    isLogin = true;
    currentUser = { username, id: d.user_id || null };
    closeAuthModal();
    onLoginStateChange();
    checkLogin();
  } catch(e) { showAuthError("网络错误，请重试"); }
}

function showAuthError(msg) { const el = document.getElementById("authError"); el.textContent = msg; el.classList.add("show"); }

function logout() {
  fetch("/api/auth/logout", { method: "POST" }).then(() => { isLogin = false; currentUser = null; onLoginStateChange(); location.reload(); });
}

function toggleDropdown(show) {
  const dd = document.getElementById("userDropdown");
  if (show === undefined) dd.classList.toggle("show");
  else dd.classList.toggle("show", show);
}

// =========================================================
// Search
// =========================================================
async function autoSearch() {
  const q = document.getElementById("stockSearch").value.trim();
  if (q.length < 2) { document.getElementById("searchResults").classList.remove("show"); return; }
  const market = document.getElementById("marketSelect").value;
  try {
    const resp = await fetch(`/api/stock/search?q=${encodeURIComponent(q)}&market=${market}`);
    const data = await resp.json();
    const list = document.getElementById("searchResults");
    list.innerHTML = "";
    if (data.results && data.results.length) {
      data.results.forEach(r => {
        const mkt = r.market || "cn";
        const badge = `<span style="font-size:11px;color:white;background:${MARKET_COLORS[mkt]};padding:1px 6px;border-radius:3px;margin-right:8px">${MARKET_LABELS[mkt]}</span>`;
        const div = document.createElement("div");
        div.innerHTML = `${badge}<span>${r.name}</span><span style="color:var(--text2)">${r.code}</span>`;
        div.onclick = () => {
          document.getElementById("stockSearch").value = r.code;
          document.getElementById("marketSelect").value = mkt;
          document.getElementById("searchResults").classList.remove("show");
          searchStock();
        };
        list.appendChild(div);
      });
      list.classList.add("show");
    } else {
      list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:12px">未找到匹配股票</div>';
      list.classList.add("show");
    }
  } catch(e) {}
}

async function searchStock() {
  let code = document.getElementById("stockSearch").value.trim();
  let market = document.getElementById("marketSelect").value;
  if (!code) return;
  document.getElementById("searchResults").classList.remove("show");
  showLoading(true);

  if (/[一-鿿]/.test(code)) {
    try {
      const sr = await fetch(`/api/stock/search?q=${encodeURIComponent(code)}&market=${market}`);
      const sd = await sr.json();
      if (sd.results && sd.results.length > 0) {
        code = sd.results[0].code;
        market = sd.results[0].market || market;
        document.getElementById("stockSearch").value = code;
        document.getElementById("marketSelect").value = market;
      } else { alert("未找到匹配股票，请尝试输入代码"); showLoading(false); return; }
    } catch(e) { alert("搜索失败: " + e.message); showLoading(false); return; }
  }

  try {
    const resp = await fetch(`/api/stock/quote?code=${encodeURIComponent(code)}&market=${market}`);
    if (!resp.ok) { alert("未找到该股票"); showLoading(false); return; }
    const q = await resp.json();
    if (q.error) { alert(q.error); showLoading(false); return; }
    currentStock = { code: q.code, name: q.name, market: market, price: q.price };

    document.getElementById("quoteName").textContent = q.name;
    document.getElementById("quoteCode").textContent = `${q.code}  ${q.currency || "CNY"}`;
    document.getElementById("quotePrice").textContent = q.price.toFixed(2);
    const chgEl = document.getElementById("quoteChange");
    chgEl.textContent = `${q.change_pct >= 0 ? "+" : ""}${q.change_pct.toFixed(2)}%  ${q.change >= 0 ? "+" : ""}${q.change.toFixed(2)}`;
    chgEl.className = "quote-change " + (q.change_pct >= 0 ? "up" : "down");
    document.getElementById("quoteCard").classList.add("show");

    const details = [
      ["开盘", q.open?.toFixed(2)], ["最高", q.high?.toFixed(2)], ["最低", q.low?.toFixed(2)],
      ["成交量", formatNum(q.volume)], ["成交额", formatNum(q.amount)],
      ["市值", formatNum(q.market_cap)], ["市盈率", q.pe || "N/A"]
    ];
    let html = "";
    details.forEach(([label, value]) => {
      html += `<div class="detail-item"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    });
    document.getElementById("quoteDetails").innerHTML = html;

    // Load all data in parallel
    loadIndicatorsChart(code, market);
    runAnalysis("comprehensive");
    document.getElementById("aspectBtns").style.display = "flex";

    if (isLogin) {
      document.getElementById("watchlistBtn").style.display = "inline-block";
      checkWatchlistStatus(code, market);
    }
    document.getElementById("alertForm").style.display = "none";
    document.getElementById("alertThreshold").value = "";

  } catch(e) { alert("错误: " + e.message); }
  finally { showLoading(false); }
}

function formatNum(n) {
  if (!n || n === 0) return "--";
  if (n >= 1e8) return (n / 1e8).toFixed(2) + "亿";
  if (n >= 1e4) return (n / 1e4).toFixed(2) + "万";
  return n.toLocaleString();
}

// =========================================================
// CANDLESTICK + INDICATOR CHARTS (complete rewrite)
// =========================================================
function drawCandlestick(canvas, data) {
  // data = { dates, klines: [{open,close,high,low,volume}], ma5,ma10,ma20,ma60, volumes }
  const ctx = canvas.getContext("2d");
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  const kl = data.klines;
  const n = kl.length;
  if (n < 2) return;

  const PAD_T = 30, PAD_R = 60, PAD_B = 30, PAD_L = 60;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;

  // Scale
  let minP = Infinity, maxP = -Infinity;
  kl.forEach(k => { minP = Math.min(minP, k.low); maxP = Math.max(maxP, k.high); });
  if (data.ma20) data.ma20.forEach(v => { if (v) { minP = Math.min(minP, v); maxP = Math.max(maxP, v); } });
  const pad = (maxP - minP) * 0.05;
  minP -= pad; maxP += pad;
  const xScale = (v) => PAD_L + (v / (n - 1)) * chartW;
  const yScale = (v) => PAD_T + (1 - (v - minP) / (maxP - minP)) * chartH;
  const candleW = Math.max(1, Math.min(12, chartW / n * 0.65));

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = "#2a2a3a";
  ctx.lineWidth = 0.5;
  const gridLines = 5;
  for (let i = 0; i <= gridLines; i++) {
    const y = PAD_T + (i / gridLines) * chartH;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
  }
  for (let i = 0; i < n; i += Math.max(1, Math.floor(n / 10))) {
    const x = xScale(i);
    ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, H - PAD_B); ctx.stroke();
  }

  // MA lines
  const mas = [{ key: "ma5", color: "#eab308", label: "MA5" },
               { key: "ma10", color: "#3b82f6", label: "MA10" },
               { key: "ma20", color: "#ec4899", label: "MA20" },
               { key: "ma60", color: "#f97316", label: "MA60" }];
  mas.forEach(ma => {
    const vals = data[ma.key];
    if (!vals) return;
    ctx.strokeStyle = ma.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < n; i++) {
      if (vals[i] === null || vals[i] === undefined) { started = false; continue; }
      const x = xScale(i), y = yScale(vals[i]);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });

  // Candlesticks
  kl.forEach((k, i) => {
    const x = xScale(i);
    const isUp = k.close >= k.open;
    ctx.fillStyle = isUp ? "#ef4444" : "#22c55e";
    ctx.strokeStyle = isUp ? "#ef4444" : "#22c55e";

    // Wick
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, yScale(k.high));
    ctx.lineTo(x, yScale(k.low));
    ctx.stroke();

    // Body
    const bodyH = Math.max(1, Math.abs(yScale(k.open) - yScale(k.close)));
    const bodyY = yScale(Math.max(k.open, k.close));
    ctx.fillRect(x - candleW / 2, bodyY, candleW, bodyH);
  });

  // Price label
  ctx.fillStyle = "#8888a0";
  ctx.font = "10px monospace";
  for (let i = 0; i <= gridLines; i++) {
    const val = minP + (maxP - minP) * (1 - i / gridLines);
    ctx.fillText(val.toFixed(2), W - PAD_R + 4, PAD_T + (i / gridLines) * chartH + 4);
  }

  // Date labels
  ctx.textAlign = "center";
  for (let i = 0; i < n; i += Math.max(1, Math.floor(n / 8))) {
    ctx.fillText(data.dates[i]?.slice(5) || "", xScale(i), H - 8);
  }

  // Legend
  ctx.textAlign = "left";
  let lx = PAD_L;
  mas.forEach(ma => {
    ctx.fillStyle = ma.color;
    ctx.fillRect(lx, 8, 12, 3);
    ctx.fillStyle = "#8888a0";
    ctx.font = "10px sans-serif";
    ctx.fillText(ma.label, lx + 16, 12);
    lx += 55;
  });
}

function drawMACDChart(canvas, data) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  if (!data.macd || !data.macd.dif) return;

  const PAD_T = 10, PAD_R = 60, PAD_B = 20, PAD_L = 60;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const n = data.dates.length;

  const allVals = [...data.macd.dif.filter(v => v !== null), ...data.macd.dea.filter(v => v !== null), ...data.macd.histogram.filter(v => v !== null)];
  let minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const pad = Math.max(0.1, (maxV - minV) * 0.1);
  minV -= pad; maxV += pad;
  const xScale = (v) => PAD_L + (v / (n - 1)) * chartW;
  const yScale = (v) => PAD_T + (1 - (v - minV) / (maxV - minV)) * chartH;

  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = "#2a2a3a";
  ctx.lineWidth = 0.5;
  const zeroY = yScale(0);
  ctx.beginPath(); ctx.moveTo(PAD_L, zeroY); ctx.lineTo(W - PAD_R, zeroY); ctx.stroke();

  // Histogram
  data.macd.histogram.forEach((v, i) => {
    if (v === null) return;
    const x = xScale(i);
    const barW = Math.max(1, chartW / n * 0.5);
    ctx.fillStyle = v >= 0 ? "#ef444466" : "#22c55e66";
    ctx.fillRect(x - barW / 2, Math.min(zeroY, yScale(v)), barW, Math.abs(zeroY - yScale(v)));
  });

  // DIF & DEA
  [{ key: "dif", color: "#eab308" }, { key: "dea", color: "#3b82f6" }].forEach(line => {
    ctx.strokeStyle = line.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let started = false;
    data.macd[line.key].forEach((v, i) => {
      if (v === null) { started = false; return; }
      const x = xScale(i), y = yScale(v);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  ctx.fillStyle = "#8888a0";
  ctx.font = "10px monospace";
  ctx.fillText(minV.toFixed(2), 2, H - 2);
  ctx.fillText(maxV.toFixed(2), 2, PAD_T + 12);
  ctx.fillText("MACD", PAD_L, PAD_T + 8);
}

function drawRSIChart(canvas, data) {
  const ctx = canvas.getContext("2d");
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  if (!data.rsi) return;

  const PAD_T = 10, PAD_R = 30, PAD_B = 20, PAD_L = 40;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;
  const n = data.dates.length;

  const xScale = (v) => PAD_L + (v / (n - 1)) * chartW;
  const yScale = (v) => PAD_T + (1 - v / 100) * chartH;

  ctx.clearRect(0, 0, W, H);

  // 30/70 lines
  ctx.strokeStyle = "#2a2a3a";
  ctx.lineWidth = 0.5;
  [30, 70, 50].forEach(v => {
    ctx.beginPath(); ctx.moveTo(PAD_L, yScale(v)); ctx.lineTo(W - PAD_R, yScale(v)); ctx.stroke();
  });

  ctx.strokeStyle = "#ec4899";
  ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;
  data.rsi.forEach((v, i) => {
    if (v === null) { started = false; return; }
    const x = xScale(i), y = yScale(v);
    if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.fillStyle = "#8888a0";
  ctx.font = "10px monospace";
  ctx.fillText("0", 2, yScale(0));
  ctx.fillText("100", 2, yScale(100));
  ctx.fillText("30", 2, yScale(30));
  ctx.fillText("70", 2, yScale(70));
  ctx.fillText("RSI(14)", PAD_L, PAD_T + 8);
}

async function loadIndicatorsChart(code, market) {
  try {
    const resp = await fetch(`/api/stock/indicators?code=${code}&market=${market}&limit=120`);
    const data = await resp.json();
    if (data.error) { console.error(data.error); return; }

    // Destroy old charts
    [klineChart, macdChart, rsiChart].forEach(c => c = null);

    const klineCanvas = document.getElementById("klineCanvas");
    drawCandlestick(klineCanvas, data);
    drawMACDChart(document.getElementById("macdCanvas"), data);

// =========================================================
// Intraday Chart
// =========================================================
async function loadIntraday() {
  if (!currentStock) return;
  try {
    const resp = await fetch(`/api/stock/intraday?code=${currentStock.code}&market=${currentStock.market}`);
    const data = await resp.json();
    if (!data.points || data.points.length < 2) return;

    const canvas = document.getElementById("intradayCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const W = canvas.width, H = canvas.height;
    const PAD_T = 20, PAD_R = 60, PAD_B = 30, PAD_L = 60;
    const chartW = W - PAD_L - PAD_R;
    const chartH = H - PAD_T - PAD_B;

    const prices = data.points.map(p => p.price);
    const n = prices.length;
    let minP = Math.min(...prices), maxP = Math.max(...prices);
    const pad = (maxP - minP) * 0.05;
    if (pad === 0) { minP -= 0.01; maxP += 0.01; }
    else { minP -= pad; maxP += pad; }

    const xScale = (v) => PAD_L + (v / (n - 1)) * chartW;
    const yScale = (v) => PAD_T + (1 - (v - minP) / (maxP - minP)) * chartH;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#1a1a24";
    ctx.fillRect(PAD_L, PAD_T, chartW, chartH);

    // Grid
    ctx.strokeStyle = "#2a2a3a";
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = PAD_T + (i / 4) * chartH;
      ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    }

    // Line
    ctx.strokeStyle = "#6366f1";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const x = xScale(i), y = yScale(prices[i]);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Fill
    ctx.lineTo(xScale(n - 1), yScale(minP));
    ctx.lineTo(xScale(0), yScale(minP));
    ctx.closePath();
    ctx.fillStyle = "#6366f118";
    ctx.fill();

    // Time labels
    ctx.fillStyle = "#8888a0";
    ctx.font = "10px sans-serif";
    ctx.textAlign = "center";
    const step = Math.max(1, Math.floor(n / 6));
    for (let i = 0; i < n; i += step) {
      ctx.fillText(data.points[i].time, xScale(i), H - 8);
    }

    // Price labels
    ctx.textAlign = "left";
    for (let i = 0; i <= 4; i++) {
      const val = minP + (maxP - minP) * (1 - i / 4);
      ctx.fillText(val.toFixed(2), W - PAD_R + 4, PAD_T + (i / 4) * chartH + 4);
    }
  } catch(e) { console.error(e); }
}

// =========================================================
// North Bound Flow
// =========================================================
async function loadNorthBound() {
  try {
    const r = await fetch("/api/market/north-bound");
    const d = await r.json();
    if (!d.flows || !d.flows.length) return;

    const canvas = document.getElementById("flowChart");
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const W = canvas.width, H = canvas.height;
    const PAD = { T: 20, R: 40, B: 30, L: 50 };
    const chartW = W - PAD.L - PAD.R;
    const chartH = H - PAD.T - PAD.B;

    const values = d.flows.map(f => f.net_flow / 1e4);
    let minV = Math.min(...values), maxV = Math.max(...values);
    if (minV > 0) minV = 0;
    if (maxV < 0) maxV = 0;
    const pad = Math.max(1, (maxV - minV) * 0.1);
    minV -= pad; maxV += pad;

    const xScale = (v) => PAD.L + (v / (values.length - 1)) * chartW;
    const yScale = (v) => PAD.T + (1 - (v - minV) / (maxV - minV)) * chartH;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#1a1a24";
    ctx.fillRect(PAD.L, PAD.T, chartW, chartH);

    // Zero line
    ctx.strokeStyle = "#2a2a3a";
    ctx.lineWidth = 0.5;
    const zeroY = yScale(0);
    ctx.beginPath(); ctx.moveTo(PAD.L, zeroY); ctx.lineTo(W - PAD.R, zeroY); ctx.stroke();

    // Bars
    const barW = Math.max(2, chartW / values.length * 0.7);
    values.forEach((v, i) => {
      const x = xScale(i);
      ctx.fillStyle = v >= 0 ? "#ef4444" : "#22c55e";
      const h = Math.abs(yScale(v) - zeroY);
      ctx.fillRect(x - barW / 2, v >= 0 ? yScale(v) : zeroY, barW, Math.max(1, h));
    });

    // Summary
    const total30 = d.flows.reduce((s, f) => s + f.net_flow, 0) / 1e8;
    document.getElementById("flowSummary").innerHTML = `
      <span>近30日累计净流入：<b style="color:${total30 >= 0 ? '#ef4444' : '#22c55e'}">${total30.toFixed(2)} 亿</b></span>
      <span style="color:var(--text2);font-size:12px">更新时间：${d.updated}</span>
    `;
  } catch(e) { console.error(e); }
}

      const triggered = alert.triggered ? '<div class="alert-triggered">✅ 已触发</div>' : '';
      div.innerHTML = `
        <div class="wl-name">${alert.name} (${alert.code})</div>
        <div class="alert-condition">${condLabels[alert.condition_type] || alert.condition_type}</div>${triggered}
        <div style="text-align:right"><button onclick="deleteAlert(${alert.id},'${alert.name}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px">删除</button></div>`;
      list.appendChild(div);
    });
  } catch(e) { console.error(e); }
}

function showAlertForm() {
  if (!isLogin) { showAuthModal("login"); return; }
  if (!currentStock) { alert("请先搜索一只股票"); return; }
  document.getElementById("alertForm").classList.toggle("show");
}

async function submitAlert() {
  if (!isLogin || !currentStock) return;
  const condition_type = document.getElementById("alertCondition").value;
  const threshold = parseFloat(document.getElementById("alertThreshold").value);
  if (isNaN(threshold)) { alert("请输入有效的阈值"); return; }
  try {
    const r = await fetch("/api/alerts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code: currentStock.code, name: currentStock.name, market: currentStock.market, condition_type, threshold })
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById("alertForm").classList.remove("show");
      document.getElementById("alertThreshold").value = "";
      loadAlerts();
    } else if (d.error) alert(d.error);
  } catch(e) { alert("添加失败: " + e.message); }
}

async function deleteAlert(alertId, name) {
  if (!confirm(`确定删除「${name}」的提醒？`)) return;
  try {
    const r = await fetch(`/api/alerts/${alertId}`, { method: "DELETE" });
    const d = await r.json();
    if (d.success) loadAlerts();
  } catch(e) { alert("删除失败"); }
}

async function loadHistory() {
  if (!isLogin) return;
  try {
    const r = await fetch("/api/analysis/history?limit=20");
    const d = await r.json();
    const list = document.getElementById("historyList");
    if (!d.items || !d.items.length) { list.innerHTML = '<div class="empty">暂无分析历史</div>'; return; }
    list.innerHTML = "";
    d.items.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      const aspectLabels = {
        comprehensive: "综合分析", technical: "技术分析", fundamental: "基本面",
        news: "新闻", valuation: "估值", sector: "行业对比", risk: "风险"
      };
      div.innerHTML = `
        <div class="wl-name">${item.name} <span style="font-size:12px;color:var(--text2)">${aspectLabels[item.aspect] || item.aspect}</span></div>
        <div class="wl-code">${item.code} · ${item.created_at}</div>`;
      div.onclick = () => {
        document.getElementById("analysisContent").textContent = item.analysis;
        document.getElementById("analysisBox").classList.add("show");
        document.getElementById("analysisTitle").textContent = `${item.name} - ${aspectLabels[item.aspect] || item.aspect}`;
      };
      list.appendChild(div);
    });
  } catch(e) { console.error(e); }
}

// =========================================================
// Misc
// =========================================================
function showLoading(v) { document.getElementById("loading").style.display = v ? "block" : "none"; }

document.getElementById("authModal").addEventListener("click", e => {
  if (e.target === document.getElementById("authModal")) closeAuthModal();
});
</script>
