<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workshop - 您的 AI 工具平台</title>
<style>
:root {
  --bg: #0f0f14; --surface: #1a1a24; --border: #2a2a3a;
  --text: #e8e8f0; --text2: #8888a0; --accent: #6366f1;
  --green: #22c55e; --blue: #3b82f6; --orange: #f59e0b;
}
* { margin:0; padding:0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 20px; font-weight: 700; color: var(--accent); }
.nav { display: flex; gap: 8px; }
.nav a { color: var(--text2); text-decoration: none; padding: 8px 16px; border-radius: 8px; transition: all .2s; font-size: 14px; }
.nav a:hover, .nav a.active { background: #6366f122; color: var(--accent); }
.hero { text-align: center; padding: 80px 24px 48px; }
.hero h1 { font-size: 42px; font-weight: 800; margin-bottom: 16px; }
.hero h1 span { color: var(--accent); }
.hero p { color: var(--text2); font-size: 18px; max-width: 500px; margin: 0 auto 32px; line-height: 1.6; }
.cta { display: inline-flex; gap: 12px; }
.cta a { padding: 12px 28px; border-radius: 10px; font-size: 15px; font-weight: 600; text-decoration: none; transition: all .2s; }
.cta .primary { background: var(--accent); color: white; }
.cta .primary:hover { background: #5558e6; }
.cta .secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.cta .secondary:hover { border-color: var(--accent); }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; padding: 0 24px 80px; max-width: 1100px; margin: 0 auto; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; cursor: pointer; transition: all .25s; text-decoration: none; color: var(--text); display: block; }
.card:hover { border-color: var(--accent); transform: translateY(-4px); }
.card .icon { font-size: 36px; margin-bottom: 16px; }
.card h3 { font-size: 20px; margin-bottom: 8px; }
.card p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
.card .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.tag-green { background: #22c55e22; color: var(--green); }
.tag-blue { background: #3b82f622; color: var(--blue); }
.tag-orange { background: #f59e0b22; color: var(--orange); }
.price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.price-row .price { font-size: 22px; font-weight: 700; color: var(--accent); }
.price-row .period { color: var(--text2); font-size: 12px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">AI Workshop</div>
  <div class="nav">
    <a href="/" class="active">首页</a>
    <a href="/stock">股票分析</a>
    <a href="/media">自媒体助手</a>
    <a href="/services">接单服务</a>
  </div>
</div>

<div class="hero">
  <h1>一个平台，<span>三大 AI 产品</span></h1>
  <p>面向金融、内容创作和定制开发的专业 AI 工具。由开发者打造，AI 驱动。</p>
  <div class="cta">
    <a href="/stock" class="primary">开始股票分析</a>
    <a href="/services" class="secondary">联系我们</a>
  </div>
</div>

<div class="cards">
  <a href="/stock" class="card">
    <div class="icon">📈</div>
    <h3>股票 AI 分析</h3>
    <p>实时 A股/港股/美股行情，AI 深度分析报告，一键生成专业 PDF 报告。</p>
    <span class="tag tag-blue">金融分析</span>
    <div class="price-row"><span class="price">¥39</span><span class="period">/月</span></div>
  </a>

  <a href="/media" class="card">
    <div class="icon">✍️</div>
    <h3>自媒体 AI 助手</h3>
    <p>内容生成、爆款话题模仿、脚本撰写、AI 配音，一站式内容创作工具包。</p>
    <span class="tag tag-green">内容创作</span>
    <div class="price-row"><span class="price">¥29</span><span class="period">/月</span></div>
  </a>

  <a href="/services" class="card">
    <div class="icon">🔧</div>
    <h3>AI 开发接单</h3>
    <p>为企业和个人定制 AI 工具、自动化脚本、全栈应用开发。</p>
    <span class="tag tag-orange">定制服务</span>
    <div class="price-row"><span class="price">¥500+</span><span class="period">/项目</span></div>
  </a>
</div>
</body>
</html>
