name: StockAI Prototype CI

on:
  push:
    paths:
      - 'prototype/stock/**'
  pull_request:
    paths:
      - 'prototype/stock/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        working-directory: prototype/stock/node_proxy
        run: npm install

      - name: Build Node proxy image
        uses: docker/setup-buildx-action@v3

      - name: Build proxy Docker image
        run: |
          docker build -t stock-proxy prototype/stock/node_proxy

      - name: Verify static site files exist
        run: |
          test -f prototype/stock/index.html
          test -f prototype/stock/styles.css
          test -f prototype/stock/app.js

      - name: Show summary
        run: |
          echo "StockAI prototype CI completed."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy stock prototype to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./prototype/stock
          publish_branch: gh-pages
