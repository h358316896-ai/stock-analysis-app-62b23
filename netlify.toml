# Netlify deploy configuration for StockAI
# Domain: kunhuang.top

[build]
  publish = "/"

# Redirect and rewrite rules
[[redirects]]
  from = "/stock/*"
  to = "/stock/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://stock-analysis-app-production-da60.up.railway.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/stock/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
