<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Test</title></head><body>
<h2>API Test</h2>
<div id="out">Testing...</div>
<script>
var API='https://stock-analysis-app-production-da60.up.railway.app';
fetch(API+'/api/dashboard').then(r=>r.json()).then(d=>{
